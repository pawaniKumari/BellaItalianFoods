# .pages.yml
media:
  input: public/images/products
  # Updated to match the input folder exactly
  output: /BellaItalianFoods/images/products

content:
  - name: products
    label: Shop Products
    type: collection
    path: src/content/products
    # Changed to {slug} to prevent spaces in your file names
    filename: "{fields.brand}/{slug}.md"
    
    # Moved the view block up here (optional, but cleaner)
    view:
      fields: [title, price, brand, publish_date]
    
    fields:
      - name: id
        label: Product ID
        type: string
        required: true
      - name: title
        label: Product Name
        type: string
        required: true
      - name: slug
        label: URL Slug (e.g., little-stars-pastina)
        type: string
        required: false
      - name: price
        label: Price
        type: number
        required: true
      - name: sku
        label: SKU (e.g., BABY-002)
        type: string
        required: false
      - name: age
        label: Recommended Age (e.g., 8+ Months)
        type: string
      - name: category
        label: Category
        type: select
        required: false
        # Changed to a vertical list so Pages CMS can read it properly
        options: 
          - Pastas
          - Riso
          - Cereal
          - Biscuits
          - Puree
          - Yoghurt
          - Fruits
          - Meats
          - Cheese
          - Oil
          - Syrup
          - Lentils
          - Lotion
          - Body Wash
          - Other
      - name: brand
        label: Brand
        type: string
        required: true
      - name: publish_date
        label: Publish Date
        type: date
        options:
          dateFormat: "MM-DD-YYYY"
      - name: image
        label: Product Image
        type: image
      - name: desc
        label: Product Description
        type: rich-text
      - name: body
        label: Product Details
        type: rich-text

# Notice I completely removed the settings: hide: true block at the bottom!